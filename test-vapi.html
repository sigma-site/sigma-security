<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Inteligent Autocam</title>
    <style>
        :root { --primary-blue: #1a1a8b; --sigma-yellow: #fff200; --dark-gray: #333; --light-gray: #f8f9fa; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background-color: var(--light-gray); display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: var(--primary-blue); color: white; padding: 15px 0; text-align: center; border-bottom: 5px solid var(--sigma-yellow); }
        .container { flex: 1; max-width: 1200px; margin: auto; padding: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Zona unde va sta încorporat chat-ul oficial de text de la Vapi */
        #vapi-chat-container {
            width: 100%;
            max-width: 480px;
            height: 600px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            border: 3px solid var(--primary-blue);
            background: white;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .btn-inapoi { display: inline-block; background-color: var(--primary-blue); color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; border: 2px solid var(--sigma-yellow); }
    </style>
</head>
<body>

<header>
    <h2>DEMO LIVE: ASISTENT DIGITAL INTELIGENT AUTOCAM</h2>
</header>

<div class="container">
    <div id="vapi-chat-container"></div>
    
    <a href="index.html" class="btn-inapoi">← Înapoi la site</a>
</div>

<script src="https://unpkg.com/@vapi-ai/web@1.0.1/dist/vapi-wm.js"></script>
<script>
  // Inițializarea ferestrei de chat direct în containerul nostru de pe pagină
  const vapiChat = new window.VapiWidget({
    apiKey: "ab245358-61ea-4876-b767-8e4ad159627d",
    assistant: "970da2f1-89c8-438c-ac8c-30abfa04528e",
    container: document.getElementById('vapi-chat-container'),
    options: {
      mode: "chat", // Forțează modul text de la tastatură
      fullscreen: false,
      theme: {
        brandColor: "#1a1a8b",
        primaryColor: "#1a1a8b",
        secondaryColor: "#fff200"
      },
      launcher: {
        disabled: true // Ascunde bulina plutitoare pentru că vrem fereastra direct deschisă pe ecran
      }
    }
  });

  // Pornește instanța automat la încărcarea paginii
  vapiChat.open();
</script>

</body>
</html>
