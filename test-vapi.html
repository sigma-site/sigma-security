</div>

<script>
    var vapiInstance = null;

    const assistant = "970da2f1-89c8-438c-ac8c-30abfa04528e";

    const apiKey = "ab245358-61ea-4876-b767-8e4ad159627d";

    const buttonConfig = {
        position: "bottom-right",
        offset: "30px",
        width: "60px",
        height: "60px",

        idle: {
            color: "#1a1a8b",
            type: "pill",
            title: "Asistent Autocam",
            subtitle: "Chat și voce",
            icon: "https://unpkg.com/lucide-static@latest/icons/message-circle.svg"
        }
    };

    (function (d, t) {

        var g = document.createElement(t),
            s = d.getElementsByTagName(t)[0];

        g.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";

        g.defer = true;
        g.async = true;

        g.onload = function () {

            vapiInstance = window.vapiSDK.run({
                apiKey: apiKey,
                assistant: assistant,
                config: buttonConfig
            });

        };

        s.parentNode.insertBefore(g, s);

    })(document, "script");
</script>
