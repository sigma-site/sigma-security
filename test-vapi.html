<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Asistent AI Edric Auto</title>
    <style>
        :root {
            --primary-blue: #1a1a8b;
            --sigma-yellow: #fff200;
            --light-gray: #f8f9fa;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--light-gray);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--primary-blue);
            color: white;
            text-align: center;
            padding: 20px;
            border-bottom: 5px solid var(--sigma-yellow);
        }

        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 40px;
            text-align: center;
        }

        .demo-box {
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            max-width: 700px;
            width: 100%;
            box-sizing: border-box;
        }

        /* STILIZARE PARAGRAF TELEFON */
        .phone-info {
            font-size: 18px; 
            line-height: 1.6;
            color: #333;
            margin-bottom: 25px;
        }
        .nobrea-phone {
            white-space: nowrap; 
            font-weight: bold;
            color: var(--primary-blue);
        }

        /* STILURI FORMULAR DE COMANDA */
        .order-form {
            margin-top: 20px;
            padding-top: 25px;
            border-top: 2px dashed #ddd;
            text-align: left;
        }
        .order-form h3 {
            color: var(--primary-blue);
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
        }
        .field-group {
            margin-bottom: 15px;
        }
        .field-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
            font-size: 14px;
        }
        .field-group input, .field-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .btn-submit {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 6px;
            font-size: 16px;
            border: 2px solid var(--sigma-yellow);
            transition: 0.2s;
        }
        .btn-submit:hover {
            background: #111166;
            transform: scale(1.01);
        }

        /* FEREASTRA IMAGINE (STINGA JOS) - SIMETRICA CU CHAT-UL */
        .image-preview-window {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 380px;
            height: 450px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            border: 3px solid var(--primary-blue);
            display: none; 
            flex-direction: column;
            overflow: hidden;
            z-index: 9999;
        }
        .preview-header {
            background: var(--primary-blue);
            color: white;
            padding: 10px 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .btn-close-preview {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
        }
        .preview-body {
            flex: 1;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .preview-body img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }
    </style>
    <script
        src="https://unpkg.com/@vapi-ai/client-sdk-react/dist/embed/widget.umd.js"
        async
        type="text/javascript">
    </script>
</head>
<body>

<header>
    <h2>DEMO LIVE - ASISTENT DIGITAL EDRIC AUTO</h2>
</header>

<div class="container">

    <div class="demo-box">
        <h1>Asistent AI pentru identificare si rezervare piese auto</h1>
         
        <p class="phone-info">
            Conversatia se desfasoara exclusiv prin chat text 
            sau telefonic la numarul <span class="nobrea-phone">+1 828 379 8248</span>
        </p>

        <div class="order-form">
            <h3>Lasa aici o cerere de cautare in magazie:</h3>
             
            <form action="https://formspree.io/f/mbdvnzoa" method="POST">
                <div class="field-group">
                    <label>Nume si Prenume</label>
                    <input type="text" name="nume" placeholder="Numele dumneavoastra..." required>
                </div>
                 
                <div class="field-group">
                    <label>Adresa de e-mail</label>
                    <input type="email" name="email" placeholder="nume@exemplu.com" required>
                </div>
                 
                <div class="field-group">
                    <label>Cod OEM (de preferat) / Nume Piesa</label>
                    <input type="text" name="cod_oem_sau_piesa" placeholder="Ex: 03G130073G sau Injector 2.0 tdi..." required>
                </div>
                 
                <button type="submit" class="btn-submit">Trimite Cererea</button>
            </form>
        </div>
    </div>

</div>

<!-- FEREASTRA PENTRU PREVIZUALIZARE IMAGINE -->
<div id="imagePreviewWindow" class="image-preview-window">
    <div class="preview-header">
        <span>Previzualizare Piesa Selectata</span>
        <button class="btn-close-preview" onclick="ascundeImaginea()">×</button>
    </div>
    <div class="preview-body">
        <img id="previewImageSrc" src="" alt="Piesa auto stoc">
    </div>
</div>

<vapi-widget
    public-key="ab245358-61ea-4876-b767-8e4ad159627d"
    assistant-id="970da2f1-89c8-438c-ac8c-30abfa04528e"
    mode="chat"
    theme="light"
    base-bg-color="#ffffff"
    accent-color="#1a1a8b"
    button-base-color="#1a1a8b"
    button-accent-color="#ffffff"
    border-radius="large"
    size="full"
    position="bottom-right"
    main-label="Asistent Edric Auto"
    chat-first-message="Bună ziua! Sint Alina de la Edric Auto dezmembrări. Cu ce piesă vă pot ajuta astăzi, aveti codul OEM ?"
    chat-placeholder="Scrie aici mesajul..."
    voice-show-transcript="false"> 
</vapi-widget>

<!-- SCRIPT SECURIZAT PENTRU CITIRE MESSAGES -->
<script>
    function afiseazaImaginea(urlPoza) {
        if (!urlPoza) return;
        
        let formattedUrl = urlPoza;
        if (urlPoza.includes('drive.google.com')) {
            // Conversie URL Google Drive pentru tag HTML standard <img>
            formattedUrl = urlPoza.replace('file/d/', 'uc?id=').replace('/view?usp=sharing', '').replace('&usp=sharing', '');
        }

        document.getElementById('previewImageSrc').src = formattedUrl;
        document.getElementById('imagePreviewWindow').style.display = 'flex';
    }

    function ascundeImaginea() {
        document.getElementById('imagePreviewWindow').style.display = 'none';
        document.getElementById('previewImageSrc').src = '';
    }

    // Interceptăm evenimentele de tip mesaj din rețeaua browserului
    window.addEventListener('message', function(event) {
        // Ignorăm mesajele care nu vin din surse sigure sau widget-uri autorizate
        if (!event.data) return;

        try {
            // Verificăm dacă structura internă conține un URL valid, ocolind blocajele de nod
            let strData = typeof event.data === 'string' ? event.data : JSON.stringify(event.data);
            
            // Căutăm link-ul de Drive
            if (strData.includes('drive.google.com')) {
                const driveRegex = /(https:\/\/drive\.google\.com\/[^\s"'}]+)/g;
                const match = strData.match(driveRegex);
                
                if (match && match[0]) {
                    let linkCurat = match[0].replace(/\\/g, '');
                    afiseazaImaginea(linkCurat);
                }
            }
        } catch (err) {
            // Pasiv la alte mesaje de sistem interne
        }
    });

    // Scurtătură demo (Tasta T) pentru a verifica instant componenta grafică
    window.addEventListener('keydown', function(e) {
        if (e.key.toLowerCase() === 't') {
            afiseazaImaginea("https://drive.google.com/uc?id=1THZFygle03J6vnBHbXcDZwnedUqBxfV6");
        }
    });
</script>

</body>
</html>
